<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>ぬりえアプリ</title>
<style>
  /* ============================================================
     デザイントークン
     ============================================================ */
  :root {
    --bg-page: #FFFBF3;
    --bg-card: #FFFFFF;
    --border-soft: #E7E1D3;
    --border-strong: #D8CFB8;
    --text-primary: #3A342A;
    --text-secondary: #7A7263;
    --text-muted: #A69C88;
    --accent: #2E8B78;
    --accent-strong: #1F6B5B;
    --accent-soft: #DCF0EA;
    --danger: #D9534F;
    --danger-soft: #FBE7E6;
    --radius-lg: 20px;
    --radius-md: 14px;
    --radius-sm: 10px;
    --font-main: -apple-system, "Hiragino Maru Gothic ProN", "Hiragino Sans", "Yu Gothic", sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg-page);
    color: var(--text-primary);
    font-family: var(--font-main);
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
  }

  #app {
    max-width: 760px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .screen { display: flex; flex-direction: column; flex: 1; }
  .screen[hidden] { display: none; }

  button {
    font-family: inherit;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .btn {
    border: 1.5px solid var(--border-strong);
    background: var(--bg-card);
    color: var(--text-primary);
    border-radius: var(--radius-sm);
    padding: 12px 20px;
    font-size: 15px;
    font-weight: 600;
    transition: transform 0.08s ease, background 0.15s ease;
  }
  .btn:active { transform: scale(0.97); }
  .btn--outline:hover { background: var(--accent-soft); }
  .btn--primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #FFFFFF;
  }
  .btn--primary:hover { background: var(--accent-strong); }
  .btn--primary:disabled {
    background: var(--border-soft);
    border-color: var(--border-soft);
    color: var(--text-muted);
    cursor: not-allowed;
  }
  .btn--large { padding: 16px 24px; font-size: 17px; width: 100%; border-radius: var(--radius-md); }

  /* ============================================================
     アップロード画面（保護者向け）
     ============================================================ */
  .upload-header {
    padding: 18px 20px 8px;
  }
  .upload-header__label {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 600;
  }

  .upload-body {
    padding: 12px 20px 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .upload-preview {
    position: relative;
    min-height: 280px;
    border: 2px dashed var(--border-strong);
    border-radius: var(--radius-lg);
    background: var(--bg-card);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .upload-placeholder {
    text-align: center;
    color: var(--text-muted);
    padding: 24px;
  }
  .upload-placeholder__icon {
    width: 52px;
    height: 52px;
    margin: 0 auto 12px;
    border-radius: 50%;
    border: 2px dashed var(--border-strong);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: var(--text-muted);
  }
  .upload-placeholder p { margin: 0; font-size: 14px; line-height: 1.6; }

  .upload-preview__img {
    max-width: 100%;
    max-height: 420px;
    object-fit: contain;
    display: block;
  }

  .upload-actions { display: flex; gap: 10px; }
  .upload-actions .btn { flex: 1; }

  .upload-hint {
    margin: 0;
    font-size: 13px;
    color: var(--text-muted);
    background: var(--bg-card);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    line-height: 1.7;
  }

  /* ============================================================
     ぬりえキャンバス画面（子ども向け）
     ============================================================ */
  .canvas-topbar {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border-soft);
    gap: 8px;
    flex-shrink: 0;
  }
  .canvas-topbar__title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-secondary);
  }
  .canvas-topbar__spacer { flex: 1; }

  .icon-btn {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    border: 1.5px solid var(--border-strong);
    background: var(--bg-card);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: var(--text-secondary);
  }
  .icon-btn:active { transform: scale(0.95); }

  .canvas-main {
    display: flex;
    flex: 1;
    padding: 14px;
    gap: 12px;
    min-height: 0;
  }

  .canvas-stage {
    flex: 1;
    position: relative;
    background: #FFFFFF;
    border-radius: var(--radius-lg);
    border: 1.5px solid var(--border-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    touch-action: none;
    min-height: 320px;
  }
  /* ズーム/パンはこのラッパーにCSS transformをかけることで実現する。
     内側の2枚のキャンバス(線画・ペイント)は常に同じラッパーの子なので、
     常に同じ倍率・同じ位置で一緒に動く。 */
  #canvasViewport {
    position: relative;
    transform-origin: 0 0;
    touch-action: none;
  }
  .canvas-stage canvas {
    position: absolute;
    top: 0;
    left: 0;
  }
  #lineartCanvas { pointer-events: none; }
  #paintCanvas { touch-action: none; }

  .toolbar {
    width: 76px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .tool-btn {
    border: 2px solid var(--border-strong);
    background: var(--bg-card);
    border-radius: var(--radius-md);
    padding: 10px 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .tool-btn__icon { font-size: 22px; line-height: 1; }
  .tool-btn__label { font-size: 10px; color: var(--text-secondary); font-weight: 600; }
  .tool-btn--active {
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  .tool-btn--active .tool-btn__label { color: var(--accent-strong); }
  .tool-btn:active { transform: scale(0.96); }

  .tool-btn--ghost {
    border-style: dashed;
    padding: 8px 4px;
  }
  .tool-btn--ghost:disabled { opacity: 0.35; }
  .tool-btn--danger { border-color: var(--danger); }
  .tool-btn--danger .tool-btn__icon { color: var(--danger); }

  .toolbar__spacer { flex: 1; }

  .brush-size {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 6px 2px;
  }
  .brush-size__label { font-size: 10px; color: var(--text-muted); font-weight: 600; }
  .brush-size input[type="range"] {
    width: 60px;
    transform: rotate(-90deg);
    margin: 26px 0;
  }

  .palette-bar {
    padding: 12px 14px 18px;
    border-top: 1px solid var(--border-soft);
    flex-shrink: 0;
  }

  .color-palette {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 8px;
  }

  .color-swatch {
    aspect-ratio: 1;
    border-radius: 50%;
    border: 2px solid rgba(0,0,0,0.08);
    padding: 0;
  }
  .color-swatch--active {
    border-color: var(--text-primary);
    box-shadow: 0 0 0 2px var(--bg-card), 0 0 0 4px var(--text-primary);
  }
  .color-swatch:active { transform: scale(0.92); }

  /* ============================================================
     確認モーダル（共通）
     ============================================================ */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(58, 52, 42, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 100;
  }
  .modal-overlay[hidden] { display: none; }

  .modal-card {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: 24px 20px;
    max-width: 320px;
    width: 100%;
    text-align: center;
  }
  .modal-card__text {
    margin: 0 0 18px;
    font-size: 15px;
    line-height: 1.7;
    color: var(--text-primary);
  }
  .modal-card__actions {
    display: flex;
    gap: 10px;
  }
  .modal-card__actions .btn { flex: 1; }

  @media (max-width: 480px) {
    .canvas-main { flex-direction: column; }
    .toolbar {
      width: auto;
      flex-direction: row;
      align-items: center;
    }
    .brush-size { flex-direction: row; }
    .brush-size input[type="range"] { transform: none; width: 90px; margin: 0; }
  }
</style>
</head>
<body>

<div id="app">

  <!-- ============================================================
       画面1: アップロード画面（保護者向け）
       ============================================================ -->
  <section id="screen-upload" class="screen screen--upload">
    <header class="upload-header">
      <span class="upload-header__label">せんがを えらぶ（保護者向け）</span>
    </header>
    <div class="upload-body">
      <div class="upload-preview" id="uploadPreviewBox">
        <div class="upload-placeholder" id="uploadPlaceholder">
          <div class="upload-placeholder__icon">+</div>
          <p>したの ボタンから<br />せんがの がぞうを えらんでください</p>
        </div>
        <img class="upload-preview__img" id="uploadPreviewImg" hidden alt="アップロードした線画のプレビュー" />
      </div>

      <input type="file" id="fileInput" accept="image/*" hidden />

      <div class="upload-actions">
        <button class="btn btn--outline" id="pickFileBtn" type="button">がぞうを えらぶ</button>
      </div>

      <p class="upload-hint">
        きれいに ぬるために、せんがは できるだけ おおきく、よけいな すきまが ない
        画像を えらんでください。<br />
        おすすめサイズ：正方形（1024×1024程度）
      </p>

      <button class="btn btn--primary btn--large" id="goToCanvasBtn" type="button" disabled>
        これで ぬる →
      </button>
    </div>
  </section>

  <!-- ============================================================
       画面2: ぬりえキャンバス画面（子ども向け）
       ============================================================ -->
  <section id="screen-canvas" class="screen screen--canvas" hidden>
    <header class="canvas-topbar">
      <button class="icon-btn" id="backBtn" type="button" aria-label="もどる">&#8592;</button>
      <span class="canvas-topbar__title">ぬりえ</span>
      <div class="canvas-topbar__spacer"></div>
    </header>

    <div class="canvas-main">
      <div class="canvas-stage" id="canvasStage">
        <div id="canvasViewport">
          <canvas id="paintCanvas"></canvas>
          <canvas id="lineartCanvas"></canvas>
        </div>
      </div>

      <aside class="toolbar">
        <button class="tool-btn tool-btn--active" id="toolBucket" type="button" data-tool="bucket" aria-label="バケツでぬる">
          <span class="tool-btn__icon" aria-hidden="true">&#128166;</span>
          <span class="tool-btn__label">バケツ</span>
        </button>
        <button class="tool-btn" id="toolBrush" type="button" data-tool="brush" aria-label="ブラシでぬる">
          <span class="tool-btn__icon" aria-hidden="true">&#128396;</span>
          <span class="tool-btn__label">ブラシ</span>
        </button>

        <div class="brush-size" id="brushSizeGroup" hidden>
          <span class="brush-size__label">ふとさ</span>
          <input type="range" id="brushSizeRange" min="4" max="40" value="14" step="1" aria-label="ブラシの太さ" />
        </div>

        <div class="toolbar__spacer"></div>

        <button class="tool-btn tool-btn--ghost" id="undoBtn" type="button" aria-label="ひとつ戻す" disabled>
          <span class="tool-btn__icon" aria-hidden="true">&#8630;</span>
        </button>
        <button class="tool-btn tool-btn--ghost" id="redoBtn" type="button" aria-label="ひとつ進める" disabled>
          <span class="tool-btn__icon" aria-hidden="true">&#8631;</span>
        </button>
        <button class="tool-btn tool-btn--ghost tool-btn--danger" id="clearBtn" type="button" aria-label="ぜんぶ けす">
          <span class="tool-btn__icon" aria-hidden="true">&#128465;</span>
        </button>
      </aside>
    </div>

    <footer class="palette-bar">
      <div class="color-palette" id="colorPalette"></div>
    </footer>
  </section>

  <!-- ============================================================
       共通: 確認モーダル
       ============================================================ -->
  <div class="modal-overlay" id="confirmModal" hidden>
    <div class="modal-card">
      <p class="modal-card__text" id="confirmModalText"></p>
      <div class="modal-card__actions">
        <button class="btn btn--outline" id="confirmCancelBtn" type="button">やめる</button>
        <button class="btn btn--primary" id="confirmOkBtn" type="button">はい</button>
      </div>
    </div>
  </div>

</div>

<script>
(function () {
  'use strict';

  /* ================================================================
   * 設定値
   * ============================================================== */
  // 補足: アップロードされた画像は、この CANVAS_MAX_CSS_WIDTH/HEIGHT の枠に
  // 収まるよう縦横比を保ったまま縮小され、実際に処理される内部解像度は
  // それに devicePixelRatio(iPad/iPhoneでは通常2〜3)を掛けたピクセル数になる。
  // 例: 640×520(CSS px) × devicePixelRatio 2 の端末なら 1280×1040px 程度で処理される。
  // アップロード画面で案内している「正方形1024×1024程度」は、この処理後の解像度で
  // 線がぼやけたり、逆に無駄に大きすぎて処理が重くなったりしない、扱いやすい目安値。
  var CONFIG = {
    CANVAS_MAX_CSS_WIDTH: 640,
    CANVAS_MAX_CSS_HEIGHT: 520,
    WALL_LUMINANCE_THRESHOLD: 200,  // これより暗い画素は「線(壁)」とみなす
    WALL_DILATE_PASSES: 1,          // 線を1pxずつ太らせて、隙間からの塗り漏れを防ぐ
    HISTORY_LIMIT: 30,
    DEFAULT_BRUSH_SIZE: 14,
    MIN_ZOOM_SCALE: 1,              // これ以上は縮小できない(=最初にフィットしたサイズ)
    MAX_ZOOM_SCALE: 4               // これ以上は拡大できない
  };

  var PALETTE_COLORS = [
    '#E4572E', '#F4845F', '#F7B32B', '#FCE083',
    '#A5D46B', '#6BAE47', '#2E8B57', '#4FB6A8',
    '#46B3E6', '#2E86DE', '#5B6FE0', '#8E7CE8',
    '#B565D8', '#E066C4', '#F17FB2', '#F4A6A6',
    '#B5651D', '#8B5A2B', '#D9B48F', '#FFFFFF',
    '#C8C8C8', '#7A7A7A', '#3A3A3A', '#000000'
  ];

  /* ================================================================
   * モジュール: 汎用ユーティリティ
   * ============================================================== */
  var Utils = {
    hexToRgba: function (hex, alpha) {
      var v = hex.replace('#', '');
      var r = parseInt(v.substring(0, 2), 16);
      var g = parseInt(v.substring(2, 4), 16);
      var b = parseInt(v.substring(4, 6), 16);
      return [r, g, b, typeof alpha === 'number' ? alpha : 255];
    },
    clamp: function (value, min, max) {
      return Math.max(min, Math.min(max, value));
    },
    computeFitSize: function (srcW, srcH, maxW, maxH) {
      var scale = Math.min(maxW / srcW, maxH / srcH);
      return {
        width: Math.max(1, Math.round(srcW * scale)),
        height: Math.max(1, Math.round(srcH * scale))
      };
    },
    distance: function (p1, p2) {
      var dx = p2.x - p1.x, dy = p2.y - p1.y;
      return Math.sqrt(dx * dx + dy * dy);
    },
    midpoint: function (p1, p2) {
      return { x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 };
    }
  };

  /* ================================================================
   * モジュール: LineartProcessor
   * 責務: アップロードされた画像から
   *   1) 表示用の線画レイヤー(半透明の線、背景は透明)
   *   2) 塗りつぶし判定用の壁マスク(隙間を1px塞いだ2値配列)
   *   を生成する。
   * ============================================================== */
  var LineartProcessor = {
    process: function (image, deviceWidth, deviceHeight) {
      var off = document.createElement('canvas');
      off.width = deviceWidth;
      off.height = deviceHeight;
      var octx = off.getContext('2d');
      octx.drawImage(image, 0, 0, deviceWidth, deviceHeight);

      var srcData = octx.getImageData(0, 0, deviceWidth, deviceHeight);
      var src = srcData.data;
      var pixelCount = deviceWidth * deviceHeight;

      var wallRaw = new Uint8Array(pixelCount);
      var lineartData = octx.createImageData(deviceWidth, deviceHeight);
      var out = lineartData.data;

      for (var i = 0; i < pixelCount; i++) {
        var o = i * 4;
        var r = src[o], g = src[o + 1], b = src[o + 2], a = src[o + 3];
        var luminance = a === 0 ? 255 : (0.299 * r + 0.587 * g + 0.114 * b);

        wallRaw[i] = luminance < CONFIG.WALL_LUMINANCE_THRESHOLD ? 1 : 0;

        var lineAlpha = a === 0 ? 0 : Utils.clamp(255 - luminance, 0, 255);
        out[o] = r;
        out[o + 1] = g;
        out[o + 2] = b;
        out[o + 3] = lineAlpha;
      }

      var wallMask = this._dilate(wallRaw, deviceWidth, deviceHeight, CONFIG.WALL_DILATE_PASSES);

      return {
        lineartImageData: lineartData,
        wallMask: wallMask,
        width: deviceWidth,
        height: deviceHeight
      };
    },

    // 壁マスクを指定回数だけ膨張させ、線の小さな隙間を塞ぐ
    _dilate: function (mask, width, height, passes) {
      var current = mask;
      for (var p = 0; p < passes; p++) {
        var next = new Uint8Array(current.length);
        for (var y = 0; y < height; y++) {
          for (var x = 0; x < width; x++) {
            var idx = y * width + x;
            if (current[idx] === 1) { next[idx] = 1; continue; }
            var isWallNearby =
              (x > 0 && current[idx - 1]) ||
              (x < width - 1 && current[idx + 1]) ||
              (y > 0 && current[idx - width]) ||
              (y < height - 1 && current[idx + width]);
            next[idx] = isWallNearby ? 1 : 0;
          }
        }
        current = next;
      }
      return current;
    }
  };

  /* ================================================================
   * モジュール: FloodFillTool（バケツ塗り）
   * 責務: 壁マスクに基づき、タップ地点と連結した領域を単色で塗る。
   * ============================================================== */
  var FloodFillTool = {
    fill: function (ctx, wallMask, width, height, startX, startY, colorRgba) {
      if (startX < 0 || startX >= width || startY < 0 || startY >= height) return false;
      var startIdx = startY * width + startX;
      if (wallMask[startIdx] === 1) return false; // 線の上はぬれない

      var imageData = ctx.getImageData(0, 0, width, height);
      var data = imageData.data;
      var visited = new Uint8Array(width * height);
      var stack = [startIdx];
      visited[startIdx] = 1;

      var r = colorRgba[0], g = colorRgba[1], b = colorRgba[2], a = colorRgba[3];

      while (stack.length) {
        var idx = stack.pop();
        var o = idx * 4;
        data[o] = r; data[o + 1] = g; data[o + 2] = b; data[o + 3] = a;

        var x = idx % width;
        var y = (idx / width) | 0;

        if (x > 0) { var l = idx - 1; if (!visited[l] && !wallMask[l]) { visited[l] = 1; stack.push(l); } }
        if (x < width - 1) { var rr = idx + 1; if (!visited[rr] && !wallMask[rr]) { visited[rr] = 1; stack.push(rr); } }
        if (y > 0) { var u = idx - width; if (!visited[u] && !wallMask[u]) { visited[u] = 1; stack.push(u); } }
        if (y < height - 1) { var d = idx + width; if (!visited[d] && !wallMask[d]) { visited[d] = 1; stack.push(d); } }
      }

      ctx.putImageData(imageData, 0, 0);
      return true;
    }
  };

  /* ================================================================
   * モジュール: BrushEngine（ブラシ塗り）
   * 責務: ポインタの軌跡に沿って線を描画する。線画レイヤーは常に
   *   ペイントレイヤーの上に重なるため、ブラシが線をはみ出しても
   *   輪郭線自体は隠れない。
   * ============================================================== */
  function BrushEngine(ctx) {
    this.ctx = ctx;
    this.drawing = false;
    this.lastPoint = null;
  }
  BrushEngine.prototype.begin = function (x, y, color, size) {
    this.drawing = true;
    this.lastPoint = { x: x, y: y };
    var ctx = this.ctx;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = color;
    ctx.lineWidth = size;
    // タップだけでも点が打てるように、ごく短い線を描く
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + 0.01, y + 0.01);
    ctx.stroke();
  };
  BrushEngine.prototype.move = function (x, y) {
    if (!this.drawing || !this.lastPoint) return;
    var ctx = this.ctx;
    ctx.beginPath();
    ctx.moveTo(this.lastPoint.x, this.lastPoint.y);
    ctx.lineTo(x, y);
    ctx.stroke();
    this.lastPoint = { x: x, y: y };
  };
  BrushEngine.prototype.end = function () {
    this.drawing = false;
    this.lastPoint = null;
  };

  /* ================================================================
   * モジュール: HistoryManager（Undo / Redo）
   * 責務: ペイントレイヤーのImageDataスナップショットをスタック管理する。
   * ============================================================== */
  function HistoryManager(limit) {
    this.limit = limit;
    this.stack = [];
    this.index = -1;
  }
  HistoryManager.prototype.reset = function (initialImageData) {
    this.stack = [initialImageData];
    this.index = 0;
  };
  HistoryManager.prototype.push = function (imageData) {
    this.stack = this.stack.slice(0, this.index + 1);
    this.stack.push(imageData);
    if (this.stack.length > this.limit) {
      this.stack.shift();
    }
    this.index = this.stack.length - 1;
  };
  HistoryManager.prototype.undo = function () {
    if (!this.canUndo()) return null;
    this.index -= 1;
    return this.stack[this.index];
  };
  HistoryManager.prototype.redo = function () {
    if (!this.canRedo()) return null;
    this.index += 1;
    return this.stack[this.index];
  };
  HistoryManager.prototype.canUndo = function () {
    return this.index > 0;
  };
  HistoryManager.prototype.canRedo = function () {
    return this.index < this.stack.length - 1;
  };

  /* ================================================================
   * モジュール: ColorPalette（カラーパレットUI）
   * ============================================================== */
  var ColorPalette = {
    render: function (container, colors, onSelect) {
      container.innerHTML = '';
      var buttons = [];
      colors.forEach(function (color) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'color-swatch';
        btn.style.background = color;
        btn.setAttribute('aria-label', color);
        btn.addEventListener('click', function () {
          buttons.forEach(function (b) { b.classList.remove('color-swatch--active'); });
          btn.classList.add('color-swatch--active');
          onSelect(color);
        });
        container.appendChild(btn);
        buttons.push(btn);
      });
      if (buttons.length > 0) {
        buttons[0].classList.add('color-swatch--active');
        onSelect(colors[0]);
      }
    }
  };

  /* ================================================================
   * モジュール: ConfirmModal（共通確認ダイアログ）
   * ============================================================== */
  var ConfirmModal = {
    _els: null,
    init: function () {
      this._els = {
        overlay: document.getElementById('confirmModal'),
        text: document.getElementById('confirmModalText'),
        okBtn: document.getElementById('confirmOkBtn'),
        cancelBtn: document.getElementById('confirmCancelBtn')
      };
    },
    ask: function (message) {
      var els = this._els;
      els.text.textContent = message;
      els.overlay.hidden = false;
      return new Promise(function (resolve) {
        function cleanup(result) {
          els.overlay.hidden = true;
          els.okBtn.removeEventListener('click', onOk);
          els.cancelBtn.removeEventListener('click', onCancel);
          resolve(result);
        }
        function onOk() { cleanup(true); }
        function onCancel() { cleanup(false); }
        els.okBtn.addEventListener('click', onOk);
        els.cancelBtn.addEventListener('click', onCancel);
      });
    }
  };

  /* ================================================================
   * モジュール: ViewportTransform（拡大縮小・移動の状態管理）
   * 責務: 線画レイヤーとペイントレイヤーをまとめて持つラッパー要素に
   *   CSSのtranslate/scaleを適用する。2枚のcanvasは常にこの1つの
   *   ラッパーの子として一緒に動くため、レイヤーがずれることはない。
   * ============================================================== */
  function ViewportTransform(el, minScale, maxScale) {
    this.el = el;
    this.minScale = minScale;
    this.maxScale = maxScale;
    this.scale = 1;
    this.translateX = 0;
    this.translateY = 0;
  }
  ViewportTransform.prototype.reset = function () {
    this.set(1, 0, 0);
  };
  ViewportTransform.prototype.set = function (scale, translateX, translateY) {
    this.scale = Utils.clamp(scale, this.minScale, this.maxScale);
    this.translateX = translateX;
    this.translateY = translateY;
    this.el.style.transform =
      'translate(' + this.translateX + 'px, ' + this.translateY + 'px) scale(' + this.scale + ')';
  };

  /* ================================================================
   * モジュール: CanvasScreenController
   * 責務: ぬりえキャンバス画面の状態とツール群を統括する。
   * ============================================================== */
  function CanvasScreenController(els) {
    this.els = els;
    this.tool = 'bucket';
    this.currentColor = PALETTE_COLORS[0];
    this.brushSize = CONFIG.DEFAULT_BRUSH_SIZE;

    this.width = 0;
    this.height = 0;
    this.wallMask = null;

    this.paintCtx = els.paintCanvas.getContext('2d');
    this.lineartCtx = els.lineartCanvas.getContext('2d');

    this.history = new HistoryManager(CONFIG.HISTORY_LIMIT);
    this.brush = new BrushEngine(this.paintCtx);

    // 拡大縮小・移動の状態。線画・ペイントの2枚のcanvasを包む
    // #canvasViewport 要素にだけtransformをかけるので、レイヤーは常に連動する。
    this.viewport = new ViewportTransform(els.canvasViewport, CONFIG.MIN_ZOOM_SCALE, CONFIG.MAX_ZOOM_SCALE);

    // 同時に触れている指(ポインタ)を pointerId ごとに記録する。
    // サイズが1なら「塗る」、2なら「拡大縮小・移動」と解釈する。
    this._activePointers = new Map();
    this._pinch = null; // ピンチ操作中の基準情報

    this._bindToolbar();
    this._bindPointerEvents();
  }

  CanvasScreenController.prototype.loadImage = function (image) {
    var dpr = window.devicePixelRatio || 1;
    var stageMaxW = Math.min(CONFIG.CANVAS_MAX_CSS_WIDTH, this.els.canvasStage.clientWidth || CONFIG.CANVAS_MAX_CSS_WIDTH);
    var stageMaxH = CONFIG.CANVAS_MAX_CSS_HEIGHT;

    var cssSize = Utils.computeFitSize(image.naturalWidth, image.naturalHeight, stageMaxW, stageMaxH);
    var deviceW = Math.round(cssSize.width * dpr);
    var deviceH = Math.round(cssSize.height * dpr);

    [this.els.paintCanvas, this.els.lineartCanvas].forEach(function (canvas) {
      canvas.width = deviceW;
      canvas.height = deviceH;
      canvas.style.width = cssSize.width + 'px';
      canvas.style.height = cssSize.height + 'px';
    });

    // viewportをcanvasと同じCSSサイズにしておくことで、canvas-stage側の
    // flexによる中央寄せがそのまま効き、transformの基準(0,0)が
    // 画像の左上に一致する。
    this.els.canvasViewport.style.width = cssSize.width + 'px';
    this.els.canvasViewport.style.height = cssSize.height + 'px';

    this.width = deviceW;
    this.height = deviceH;

    // 新しい画像を読み込むたびに拡大率・位置を初期状態に戻す
    this.viewport.reset();
    this._activePointers.clear();
    this._pinch = null;

    var processed = LineartProcessor.process(image, deviceW, deviceH);
    this.wallMask = processed.wallMask;
    this.lineartCtx.clearRect(0, 0, deviceW, deviceH);
    this.lineartCtx.putImageData(processed.lineartImageData, 0, 0);

    this.paintCtx.clearRect(0, 0, deviceW, deviceH);
    var blankSnapshot = this.paintCtx.getImageData(0, 0, deviceW, deviceH);
    this.history.reset(blankSnapshot);
    this._updateHistoryButtons();
  };

  CanvasScreenController.prototype._bindToolbar = function () {
    var self = this;
    var els = this.els;

    els.toolBucket.addEventListener('click', function () { self._setTool('bucket'); });
    els.toolBrush.addEventListener('click', function () { self._setTool('brush'); });

    els.brushSizeRange.addEventListener('input', function (e) {
      self.brushSize = parseInt(e.target.value, 10);
    });

    els.undoBtn.addEventListener('click', function () {
      var data = self.history.undo();
      if (data) {
        self.paintCtx.putImageData(data, 0, 0);
        self._updateHistoryButtons();
      }
    });
    els.redoBtn.addEventListener('click', function () {
      var data = self.history.redo();
      if (data) {
        self.paintCtx.putImageData(data, 0, 0);
        self._updateHistoryButtons();
      }
    });

    els.clearBtn.addEventListener('click', function () {
      ConfirmModal.ask('ぜんぶ けしますか？\nいまの いろは もどせません。').then(function (ok) {
        if (!ok) return;
        self.paintCtx.clearRect(0, 0, self.width, self.height);
        self.history.push(self.paintCtx.getImageData(0, 0, self.width, self.height));
        self._updateHistoryButtons();
      });
    });

    ColorPalette.render(els.colorPalette, PALETTE_COLORS, function (color) {
      self.currentColor = color;
    });
  };

  CanvasScreenController.prototype._setTool = function (tool) {
    this.tool = tool;
    this.els.toolBucket.classList.toggle('tool-btn--active', tool === 'bucket');
    this.els.toolBrush.classList.toggle('tool-btn--active', tool === 'brush');
    this.els.brushSizeGroup.hidden = tool !== 'brush';
  };

  // 塗り操作(バケツ・ブラシ)は指1本のときだけ有効。
  // 指2本になった瞬間からは拡大縮小・移動(ピンチ)モードに切り替える。
  CanvasScreenController.prototype._bindPointerEvents = function () {
    var self = this;
    var canvas = this.els.paintCanvas;
    var stage = this.els.canvasStage;

    // 画面上の座標を、canvasの内部ピクセル座標に変換する。
    // getBoundingClientRect()は現在のCSS transform(拡大縮小・移動)が
    // 反映された「見た目どおりの」矩形を返すため、ここでのスケール計算は
    // ズームの状態を意識せずにそのまま使える。
    function getCanvasCoords(e) {
      var rect = canvas.getBoundingClientRect();
      var scaleX = canvas.width / rect.width;
      var scaleY = canvas.height / rect.height;
      return {
        x: Math.floor((e.clientX - rect.left) * scaleX),
        y: Math.floor((e.clientY - rect.top) * scaleY)
      };
    }

    function getStageLocalPoint(clientX, clientY) {
      var rect = stage.getBoundingClientRect();
      return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function pointersAsArray() {
      return Array.from(self._activePointers.values());
    }

    function beginPinch() {
      var pts = pointersAsArray();
      var mid = Utils.midpoint(pts[0], pts[1]);
      var midStage = getStageLocalPoint(mid.x, mid.y);
      self._pinch = {
        startDistance: Utils.distance(pts[0], pts[1]),
        startScale: self.viewport.scale,
        // ピンチ開始時に指の下にあった「コンテンツ上の点」を固定し、
        // 以降はその点が常に2本指の中点の真下に来るようtranslateを計算する。
        anchorContent: {
          x: (midStage.x - self.viewport.translateX) / self.viewport.scale,
          y: (midStage.y - self.viewport.translateY) / self.viewport.scale
        }
      };
    }

    function updatePinch() {
      var pts = pointersAsArray();
      if (pts.length < 2 || !self._pinch) return;
      var distance = Utils.distance(pts[0], pts[1]);
      var mid = Utils.midpoint(pts[0], pts[1]);
      var midStage = getStageLocalPoint(mid.x, mid.y);

      var rawScale = self._pinch.startScale * (distance / self._pinch.startDistance);
      var newScale = Utils.clamp(rawScale, CONFIG.MIN_ZOOM_SCALE, CONFIG.MAX_ZOOM_SCALE);

      var newTranslateX = midStage.x - self._pinch.anchorContent.x * newScale;
      var newTranslateY = midStage.y - self._pinch.anchorContent.y * newScale;

      self.viewport.set(newScale, newTranslateX, newTranslateY);
    }

    function cancelDrawingIfAny() {
      if (self.brush.drawing) {
        self.brush.end();
        self.history.push(self.paintCtx.getImageData(0, 0, self.width, self.height));
        self._updateHistoryButtons();
      }
    }

    canvas.addEventListener('pointerdown', function (e) {
      if (!self.width) return;
      e.preventDefault();

      self._activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

      if (self._activePointers.size === 2) {
        // 指が2本になった瞬間: 描画中なら確定させてからピンチ操作へ切り替える
        cancelDrawingIfAny();
        beginPinch();
        return;
      }
      if (self._activePointers.size > 2) {
        return; // 3本目以降は無視する(誤操作防止)
      }

      // ここに来るのは指1本のとき = 通常の塗りツール
      var pos = getCanvasCoords(e);

      if (self.tool === 'bucket') {
        var colorRgba = Utils.hexToRgba(self.currentColor, 255);
        var changed = FloodFillTool.fill(self.paintCtx, self.wallMask, self.width, self.height, pos.x, pos.y, colorRgba);
        if (changed) {
          self.history.push(self.paintCtx.getImageData(0, 0, self.width, self.height));
          self._updateHistoryButtons();
        }
      } else if (self.tool === 'brush') {
        canvas.setPointerCapture(e.pointerId);
        var deviceBrushSize = self.brushSize * (canvas.width / canvas.getBoundingClientRect().width);
        self.brush.begin(pos.x, pos.y, self.currentColor, deviceBrushSize);
      }
    });

    canvas.addEventListener('pointermove', function (e) {
      if (!self._activePointers.has(e.pointerId)) return;
      e.preventDefault();
      self._activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

      if (self._activePointers.size >= 2) {
        updatePinch();
        return;
      }

      if (self.tool !== 'brush' || !self.brush.drawing) return;
      var pos = getCanvasCoords(e);
      self.brush.move(pos.x, pos.y);
    });

    function endStroke(e) {
      if (!self._activePointers.has(e.pointerId)) return;
      self._activePointers.delete(e.pointerId);

      if (self._activePointers.size < 2) {
        self._pinch = null; // ピンチ操作を終了(指が1本以下になったら)
      }

      if (self._activePointers.size === 0 && self.tool === 'brush' && self.brush.drawing) {
        self.brush.end();
        self.history.push(self.paintCtx.getImageData(0, 0, self.width, self.height));
        self._updateHistoryButtons();
      }
    }
    canvas.addEventListener('pointerup', endStroke);
    canvas.addEventListener('pointercancel', endStroke);
  };

  CanvasScreenController.prototype._updateHistoryButtons = function () {
    this.els.undoBtn.disabled = !this.history.canUndo();
    this.els.redoBtn.disabled = !this.history.canRedo();
  };

  /* ================================================================
   * モジュール: UploadScreenController
   * 責務: 画像選択・プレビュー・キャンバス画面への受け渡し。
   * ============================================================== */
  function UploadScreenController(els, onImageReady) {
    this.els = els;
    this.onImageReady = onImageReady;
    this.selectedImage = null;
    this._bind();
  }
  UploadScreenController.prototype._bind = function () {
    var self = this;
    var els = this.els;

    els.pickFileBtn.addEventListener('click', function () {
      els.fileInput.click();
    });

    els.fileInput.addEventListener('change', function (e) {
      var file = e.target.files && e.target.files[0];
      if (!file) return;

      var reader = new FileReader();
      reader.onload = function (ev) {
        var img = new Image();
        img.onload = function () {
          self.selectedImage = img;
          els.uploadPreviewImg.src = ev.target.result;
          els.uploadPreviewImg.hidden = false;
          els.uploadPlaceholder.hidden = true;
          els.goToCanvasBtn.disabled = false;
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });

    els.goToCanvasBtn.addEventListener('click', function () {
      if (!self.selectedImage) return;
      self.onImageReady(self.selectedImage);
    });
  };
  UploadScreenController.prototype.reset = function () {
    this.selectedImage = null;
    this.els.uploadPreviewImg.hidden = true;
    this.els.uploadPreviewImg.src = '';
    this.els.uploadPlaceholder.hidden = false;
    this.els.goToCanvasBtn.disabled = true;
    this.els.fileInput.value = '';
  };

  /* ================================================================
   * App bootstrap: 画面遷移の統括
   * ============================================================== */
  function App() {
    ConfirmModal.init();

    var screenUpload = document.getElementById('screen-upload');
    var screenCanvas = document.getElementById('screen-canvas');

    var canvasScreen = new CanvasScreenController({
      canvasStage: document.getElementById('canvasStage'),
      canvasViewport: document.getElementById('canvasViewport'),
      paintCanvas: document.getElementById('paintCanvas'),
      lineartCanvas: document.getElementById('lineartCanvas'),
      toolBucket: document.getElementById('toolBucket'),
      toolBrush: document.getElementById('toolBrush'),
      brushSizeGroup: document.getElementById('brushSizeGroup'),
      brushSizeRange: document.getElementById('brushSizeRange'),
      undoBtn: document.getElementById('undoBtn'),
      redoBtn: document.getElementById('redoBtn'),
      clearBtn: document.getElementById('clearBtn'),
      colorPalette: document.getElementById('colorPalette')
    });

    var uploadScreen = new UploadScreenController({
      pickFileBtn: document.getElementById('pickFileBtn'),
      fileInput: document.getElementById('fileInput'),
      uploadPreviewImg: document.getElementById('uploadPreviewImg'),
      uploadPlaceholder: document.getElementById('uploadPlaceholder'),
      goToCanvasBtn: document.getElementById('goToCanvasBtn')
    }, function (image) {
      screenUpload.hidden = true;
      screenCanvas.hidden = false;
      // レイアウト確定後にサイズ計算するため、次フレームで読み込む
      requestAnimationFrame(function () {
        canvasScreen.loadImage(image);
      });
    });

    document.getElementById('backBtn').addEventListener('click', function () {
      ConfirmModal.ask('せんがを かえますか？\nいまの ぬりえは きえます。').then(function (ok) {
        if (!ok) return;
        screenCanvas.hidden = true;
        screenUpload.hidden = false;
        uploadScreen.reset();
      });
    });
  }

  document.addEventListener('DOMContentLoaded', App);
})();
</script>

</body>
